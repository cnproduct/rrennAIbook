name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 直接用 winget 安装官方 tccli，替代 npm 方式
      - name: Install Tencent Cloud CLI via winget
        run: |
          winget install TencentCloud.TCCLI --silent
          refreshenv
          echo "C:\Program Files\Tencent Cloud\TCCLI" | Out-File -FilePath $env:GITHUB_PATH -Append

      # 配置 CLI
      - name: Configure Tencent Cloud CLI
        run: |
          tccli configure set secretId ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          tccli configure set secretKey ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          tccli configure set region ap-siliconvalley

      # 执行 TAT 部署命令
      - name: Deploy using TAT
        run: |
          tccli tat InvokeCommand --InstanceIds '["lhins-rv24ophb"]' --CommandContent 'Write-Host "自动部署脚本测试成功！"'
