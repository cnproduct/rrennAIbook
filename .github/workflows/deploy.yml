name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Python 和腾讯云 CLI
      - name: Install Tencent Cloud CLI
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip3 install tencentcloudcli

      # 配置 CLI 并执行 TAT 命令
      - name: Run TAT command
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          REGION: ap-siliconvalley
          INSTANCE_ID: lhins-rv24ophb
          COMMAND_CONTENT: "Write-Host '自动部署脚本测试成功！'"
        run: |
          tccli configure set secretId $TENCENT_SECRET_ID
          tccli configure set secretKey $TENCENT_SECRET_KEY
          tccli configure set region $REGION
          tccli tat InvokeCommand --InstanceIds '["$INSTANCE_ID"]' --CommandContent "$COMMAND_CONTENT"
