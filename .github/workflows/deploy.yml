name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt update && sudo apt install -y openssh-client sshpass

      # 测试服务器连接（先不做同步，先确认能不能连上）
      - name: Test SSH connection
        env:
          SERVER_IP: ${{ secrets.TENCENT_SERVER_IP }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.TENCENT_SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "echo '连接成功！'"
