name: Deploy to Windows Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y openssh-client sshpass

      # 打包代码（排除不必要文件）
      - name: Package code
        run: |
          tar -czf deploy.tar.gz --exclude=.git --exclude=.github --exclude=.gitignore .

      # 用 scp 上传压缩包到服务器
      - name: Upload code via scp
        env:
          SERVER_IP: ${{ secrets.TENCENT_SERVER_IP }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.TENCENT_SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no deploy.tar.gz $SERVER_USER@$SERVER_IP:/C/rrennAibook/

      # 登录服务器，解压并部署
      - name: Deploy & Start Project
        env:
          SERVER_IP: ${{ secrets.TENCENT_SERVER_IP }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.TENCENT_SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
            cd C:\rrennAibook
            tar -xzf deploy.tar.gz
            del deploy.tar.gz
            npm install
            npm run build
            if (pm2 list | Select-String 'rrennAibook') { pm2 restart rrennAibook } else { pm2 start app.js --name rrennAibook }
            echo '✅ 部署完成！项目已启动'
          "
