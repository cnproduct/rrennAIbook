name: Deploy to Windows Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y openssh-client sshpass zip

      # 打包代码
      - name: Package code with zip
        run: |
          zip -r deploy.zip . -x '*.git*' -x '*.github*' -x '*.gitignore*'

      # 先创建目标目录，然后上传 zip 文件
      - name: Create directory & Upload via scp
        env:
          SERVER_IP: ${{ secrets.TENCENT_SERVER_IP }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.TENCENT_SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "mkdir -p C:/rrennAibook"
          sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no deploy.zip $SERVER_USER@$SERVER_IP:/C/rrennAibook/

      # 登录服务器，解压并部署
      - name: Deploy & Start Project
        env:
          SERVER_IP: ${{ secrets.TENCENT_SERVER_IP }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.TENCENT_SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
            cd C:\rrennAibook
            Expand-Archive deploy.zip -DestinationPath .
            del deploy.zip
            npm install
            npm run build
            if (pm2 list | Select-String 'rrennAibook') { pm2 restart rrennAibook } else { pm2 start app.js --name rrennAibook }
            Write-Host '✅ 部署完成！项目已启动'
          "
