name: Deploy to Windows Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y openssh-client sshpass zip

      # 打包代码（zip 格式，兼容 Windows）
      - name: Package code with zip
        run: |
          zip -r deploy.zip . -x '*.git*' -x '*.github*' -x '*.gitignore*'

      # 上传 zip 文件到服务器的用户根目录（最稳妥的方式）
      - name: Upload zip via scp
        env:
          SERVER_IP: ${{ secrets.TENCENT_SERVER_IP }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.TENCENT_SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no deploy.zip $SERVER_USER@$SERVER_IP:

      # 登录服务器，创建目录、解压、部署（纯 PowerShell 命令）
      - name: Deploy & Start Project
        env:
          SERVER_IP: ${{ secrets.TENCENT_SERVER_IP }}
          SERVER_USER: ${{ secrets.TENCENT_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.TENCENT_SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
            # 用 PowerShell 命令创建目录
            New-Item -ItemType Directory -Path C:\rrennAibook -Force
            # 移动 zip 文件到目标目录
            Move-Item -Path C:\Users\$env:USERNAME\deploy.zip -Destination C:\rrennAibook\
            # 进入目录
            cd C:\rrennAibook
            # 解压 zip 文件
            Expand-Archive -Path deploy.zip -DestinationPath .
            # 删除 zip 文件
            Remove-Item -Path deploy.zip
            # 安装依赖
            npm install
            # 构建项目
            npm run build
            # 启动/重启项目（pm2）
            if (pm2 list | Select-String 'rrennAibook') {
              pm2 restart rrennAibook
            } else {
              pm2 start app.js --name rrennAibook
            }
            Write-Host '✅ 部署完成！项目已启动'
          "
